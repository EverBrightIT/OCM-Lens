# This showcase repository has no code to build. Its only pipeline turns a
# pushed tag into a GitLab release, so the product home shows versions and
# activity without duplicating the monorepo's CI.
#
# Flow: after a monorepo release (tag vX.Y.Z there), push the same tag here:
#   git tag v0.16.0 && git push origin v0.16.0
# The release notes link to the shared CHANGELOG; the vsix asset points at
# the package built by the monorepo's own gitlab.com tag pipeline.
workflow:
  rules:
    - if: $CI_COMMIT_TAG

# No release: keyword here on purpose: the vsix asset link is only added
# when the monorepo's gitlab.com tag pipeline has actually published the
# package (best effort, same as the GitHub workflow), and that needs a
# conditional release-cli call.
release:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - |
      cat > release-notes.md <<EOF
      OCM Lens $CI_COMMIT_TAG, released in lockstep with SBOM Lens from the
      [sbom-lens monorepo](https://gitlab.com/everbrightit-group/sbom-lens).
      Full notes for this version are in the shared
      [CHANGELOG](https://gitlab.com/everbrightit-group/sbom-lens/-/blob/main/CHANGELOG.md).

      - Web app: <https://ocm-lens.everbright-it.de/app/>
      - VS Code extension: <https://open-vsx.org/extension/everbright-it/ocmlens>
      EOF
    - |
      url="https://gitlab.com/api/v4/projects/everbrightit-group%2Fsbom-lens/packages/generic/ocmlens/$CI_COMMIT_TAG/ocmlens.vsix"
      if wget -q --spider "$url" 2>/dev/null; then
        release-cli create --tag-name "$CI_COMMIT_TAG" --name "OCM Lens $CI_COMMIT_TAG" \
          --description "$(cat release-notes.md)" \
          --assets-link "{\"name\":\"ocmlens.vsix\",\"url\":\"$url\",\"link_type\":\"package\"}"
      else
        echo "vsix not published on gitlab.com for $CI_COMMIT_TAG; creating the release without the asset link"
        release-cli create --tag-name "$CI_COMMIT_TAG" --name "OCM Lens $CI_COMMIT_TAG" \
          --description "$(cat release-notes.md)"
      fi
