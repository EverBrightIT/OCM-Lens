# GitHub counterpart of .gitlab-ci.yml: the mirrored tag becomes a GitHub
# release. Releases are per-platform metadata, so each platform creates its
# own; the automatic GITHUB_TOKEN is enough.
#
# The vsix is built by the monorepo's pipelines, not here. If the monorepo's
# gitlab.com tag pipeline has already published it to the package registry,
# it is attached as an asset; otherwise the release still appears and the
# notes carry the links (best effort on purpose, so tag order between the
# repos never blocks the release).
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble release notes
        run: |
          cat > release-notes.md <<EOF
          OCM Lens $GITHUB_REF_NAME, released in lockstep with SBOM Lens from the
          [sbom-lens monorepo](https://gitlab.com/everbrightit-group/sbom-lens).
          Full notes for this version are in the shared
          [CHANGELOG](https://gitlab.com/everbrightit-group/sbom-lens/-/blob/main/CHANGELOG.md).

          - Web app: <https://ocm-lens.everbright-it.de/app/>
          - VS Code extension: <https://open-vsx.org/extension/everbright-it/ocmlens>
          EOF

      - name: Fetch ocmlens.vsix (best effort)
        run: |
          url="https://gitlab.com/api/v4/projects/everbrightit-group%2Fsbom-lens/packages/generic/ocmlens/$GITHUB_REF_NAME/ocmlens.vsix"
          curl -fsSL "$url" -o ocmlens.vsix || echo "vsix not published yet on gitlab.com; releasing without the asset"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=""
          [ -f ocmlens.vsix ] && assets="ocmlens.vsix"
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "OCM Lens $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            $assets
